<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bar Canton - QR Code</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #1a1a1a 0%, #2c2c2c 100%);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        
        .container {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            text-align: center;
        }
        
        h1 {
            color: #1a1a1a;
            margin-top: 0;
            font-size: 2rem;
        }
        
        .subtitle {
            color: #f39c12;
            font-size: 1.1rem;
            margin-bottom: 30px;
        }
        
        #qrcode {
            display: inline-block;
            padding: 20px;
            background: white;
        }
        
        .instructions {
            margin-top: 30px;
            color: #666;
            font-size: 0.95rem;
        }
        
        .instructions strong {
            color: #1a1a1a;
        }
        
        button {
            margin-top: 20px;
            padding: 12px 30px;
            background: #f39c12;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: 600;
        }
        
        button:hover {
            background: #d68910;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🍕 Bar Canton</h1>
        <p class="subtitle">Digital Menu QR Code</p>
        
        <div id="qrcode"></div>
        
        <p class="instructions">
            <strong>آن رو دانلود یا پرینت کنید!</strong><br>
            مشتری‌ها با بارکد اسکن کردن منو رو می‌بینند
        </p>
        
        <button onclick="window.print()">🖨️ چاپ کنید</button>
        <button onclick="downloadQR()">📥 دانلود کنید</button>
    </div>

    <script>
        // QR Code ایجاد کنید
        const url = 'https://restaurant-menu-opyqa62mf-snz-mlcoders-projects.vercel.app/';
        
        const qrcode = new QRCode(document.getElementById("qrcode"), {
            text: url,
            width: 300,
            height: 300,
            colorDark: "#1a1a1a",
            colorLight: "#ffffff",
            correctLevel: QRCode.CorrectLevel.H
        });
        
        // دانلود تابع
        function downloadQR() {
            const canvas = document.querySelector('#qrcode canvas');
            const link = document.createElement('a');
            link.href = canvas.toDataURL('image/png');
            link.download = 'bar-canton-menu-qr.png';
            link.click();
        }
    </script>
</body>
</html>
